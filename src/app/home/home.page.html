<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title style="font-weight: 700; font-size: 1.5rem; letter-spacing: 1px;">
      <ion-icon name="cloud-outline" style="vertical-align: middle; margin-right: 5px;"></ion-icon>
      CYRRUS
    </ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/auth" fill="solid" color="light" shape="round" class="ion-margin-end">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Login
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  <div id="container">
    
    <ion-card class="hero-section ion-text-center ion-padding" color="primary" style="margin: 0 0 20px 0; width: 100%; border-radius: 0 0 30px 30px; box-shadow: none;">
      <ion-card-header>
        <ion-card-title style="font-weight: bold; font-size: 2rem; color: white;">Bem-vindo ao Cyrrus</ion-card-title>
      </ion-card-header>
      <ion-card-content style="font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: white;">
        Acompanhe as campanhas de vacinação da sua região de forma fácil e rápida.
      </ion-card-content>
    </ion-card>

    <app-campanhas></app-campanhas>

  </div>
</ion-content>
