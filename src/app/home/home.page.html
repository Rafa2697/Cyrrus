<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title style="font-weight: 700; font-size: 1.5rem; letter-spacing: 1px;">
      <ion-icon name="cloud-outline" style="vertical-align: middle; margin-right: 5px;"></ion-icon>
      CYRRUS
    </ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/auth" fill="solid" color="light" shape="round" class="ion-margin-end">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Login
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
  <div id="container">
    
    <div class="hero-section ion-text-center ion-padding" style="background: var(--ion-color-primary); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 20px;">
      <h1 style="font-weight: bold; font-size: 2rem;">Bem-vindo ao Cyrrus</h1>
      <p style="font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Acompanhe as campanhas de vacinação da sua região de forma fácil e rápida.</p>
    </div>

    <app-campanhas></app-campanhas>

  </div>
</ion-content>
