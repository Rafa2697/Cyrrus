<div class="dados-user ion-padding">
  @if (authService.user$ | async; as user) {
    <ion-item lines="none" class="user-info">
      <ion-avatar slot="start">
        <img [src]="user.photoURL" [alt]="user.displayName ?? 'Foto de perfil'" />
      </ion-avatar>
      <ion-label>
        <h2>Olá, {{ user.displayName }}!</h2>
        <p>{{ user.email }}</p>
      </ion-label>
    </ion-item>

    <ion-button expand="block" color="danger" fill="outline" (click)="authService.logout()">
      Sair
    </ion-button>
  } @else {
    <ion-text color="medium">
      <p class="guest-message">Você não está conectado.</p>
    </ion-text>

    <ion-button expand="block" color="primary" (click)="authService.loginWithGoogle()">
      Entrar com o Google
    </ion-button>
  }
</div>
